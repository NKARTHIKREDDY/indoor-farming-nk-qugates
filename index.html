<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QROBOTIX Water Quality</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; color: #222; padding: 20px; }
    h1 { text-align: center; margin-bottom: 6px; font-size: 1.6rem; }
    .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; max-width: 1000px; margin: auto; }
    .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .label { font-size: 0.85rem; color: #888; margin-bottom: 6px; }
    .value { font-size: 2rem; font-weight: bold; }
    .good { color: #16a34a; }
    .ok { color: #d97706; }
    .high { color: #dc2626; }
    .conn { text-align: center; margin: 16px auto; font-size: 0.9rem; padding: 8px 20px; border-radius: 20px; display: inline-block; }
    .conn-ok { background: #dcfce7; color: #16a34a; }
    .conn-err { background: #fee2e2; color: #dc2626; }
    .center { text-align: center; }
    .badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
    .badge-on { background: #dcfce7; color: #16a34a; }
    .badge-off { background: #f1f5f9; color: #94a3b8; }
    .timestamp { text-align: center; color: #aaa; font-size: 0.8rem; margin-top: 20px; }
    .raw { background: #1e293b; color: #94d2bd; border-radius: 12px; padding: 16px; font-size: 0.78rem; max-width: 1000px; margin: 16px auto 0; overflow-x: auto; }
  </style>
</head>
<body>

  <h1>QROBOTIX Water Quality Monitor</h1>
  <p class="subtitle">Live ESP32 data via EMQX Cloud MQTT</p>

  <div class="center">
    <span class="conn conn-err" id="connStatus">Connecting...</span>
  </div>

  <div class="grid" style="margin-top:20px;">
    <div class="card">
      <div class="label">pH Value</div>
      <div class="value" id="ph">--</div>
    </div>
    <div class="card">
      <div class="label">TDS</div>
      <div class="value" id="tds">-- ppm</div>
    </div>
    <div class="card">
      <div class="label">Water Status</div>
      <div class="value" id="wstatus">--</div>
    </div>
    <div class="card">
      <div class="label">Motor</div>
      <div class="value" id="motor">--</div>
    </div>
    <div class="card">
      <div class="label">Light</div>
      <div class="value" id="light">--</div>
    </div>
    <div class="card">
      <div class="label">Valve 1</div>
      <div class="value" id="valve1">--</div>
    </div>
    <div class="card">
      <div class="label">Valve 2</div>
      <div class="value" id="valve2">--</div>
    </div>
    <div class="card">
      <div class="label">Valve 3</div>
      <div class="value" id="valve3">--</div>
    </div>
    <div class="card">
      <div class="label">Valve 4</div>
      <div class="value" id="valve4">--</div>
    </div>
  </div>

  <p class="timestamp" id="lastSeen">Waiting for data...</p>

  <pre class="raw" id="rawJson">{ waiting for payload... }</pre>

  <script>
    const broker = "wss://ye9b1110.ala.asia-southeast1.emqxsl.com:8084/mqtt";
    const options = {
      clientId: "dashboard_" + Math.random().toString(16).slice(2, 8),
      username: "qugates",
      password: "qugates123",
      clean: true,
      connectTimeout: 5000,
      reconnectPeriod: 3000
    };

    const client = mqtt.connect(broker, options);

    client.on("connect", () => {
      document.getElementById("connStatus").textContent = "Connected to EMQX Cloud";
      document.getElementById("connStatus").className = "conn conn-ok";
      client.subscribe("nkarthik/waterquality/live");
    });

    client.on("reconnect", () => {
      document.getElementById("connStatus").textContent = "Reconnecting...";
      document.getElementById("connStatus").className = "conn conn-err";
    });

    client.on("error", () => {
      document.getElementById("connStatus").textContent = "Connection Error";
      document.getElementById("connStatus").className = "conn conn-err";
    });

    client.on("message", (topic, message) => {
      try {
        const d = JSON.parse(message.toString());

        document.getElementById("ph").textContent = d.ph ?? "--";
        document.getElementById("tds").textContent = (d.tds ?? "--") + " ppm";

        const ws = document.getElementById("wstatus");
        ws.textContent = d.water_status ?? "--";
        ws.className = "value " + (
          d.water_status === "GOOD" ? "good" :
          d.water_status === "OK"   ? "ok"   : "high"
        );

        setOnOff("motor",  d.motor);
        setOnOff("light",  d.light);
        setOnOff("valve1", d.valve1);
        setOnOff("valve2", d.valve2);
        setOnOff("valve3", d.valve3);
        setOnOff("valve4", d.valve4);

        const now = new Date();
        document.getElementById("lastSeen").textContent =
          "Last updated: " + now.toLocaleTimeString();

        document.getElementById("rawJson").textContent =
          JSON.stringify(d, null, 2);

      } catch(e) {
        document.getElementById("rawJson").textContent = message.toString();
      }
    });

    function setOnOff(id, val) {
      const el = document.getElementById(id);
      el.textContent = val ? "ON" : "OFF";
      el.className = "value " + (val ? "good" : "");
    }
  </script>
</body>
</html>
